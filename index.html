<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bhavzzz Chat 💕</title>

<style>
    .hearts{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
}

.hearts span{
    position:absolute;
    bottom:-50px;
    font-size:30px;
    animation: floatHeart 10s linear infinite;
}

.hearts span:nth-child(1){
    left:10%;
    animation-delay:0s;
}

.hearts span:nth-child(2){
    left:30%;
    animation-delay:2s;
}

.hearts span:nth-child(3){
    left:50%;
    animation-delay:4s;
}

.hearts span:nth-child(4){
    left:70%;
    animation-delay:6s;
}

.hearts span:nth-child(5){
    left:90%;
    animation-delay:8s;
}

@keyframes floatHeart{
    0%{
        transform:translateY(0);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(-110vh);
        opacity:0;
    }
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9ecf,#d9b3ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:95%;
    max-width:450px;
    height:90vh;
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    position:relative;
z-index:1;
}

.header{
    background:#ff5fa2;
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.user-box{
    padding:10px;
    border-bottom:1px solid #eee;
}

.user-box input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

#chatBox{
    flex:1;
    overflow-y:auto;
    padding:10px;
    background:#fff7fb;
}

.message{
    max-width:75%;
    padding:10px;
    border-radius:15px;
    margin:8px;
    word-wrap:break-word;
}

.left{
    background:#ffffff;
    margin-right:auto;
}

.right{
    background:#dcf8c6;
    margin-left:auto;
    text-align:left;
}

.name{
    font-weight:bold;
    color:#d63384;
}

.time{
    font-size:11px;
    color:gray;
}

.input-area{
    display:flex;
    padding:10px;
    gap:5px;
    border-top:1px solid #eee;
}

.input-area input{
    flex:1;
    padding:12px;
    border-radius:20px;
    border:1px solid #ccc;
}

button{
    background:#ff5fa2;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:20px;
    cursor:pointer;
}
.user-box{
    display:flex;
    gap:5px;
}

.user-box input{
    flex:1;
}
.dark{
    background:#111;
    color:white;
}

.dark #chatBox{
    background:#222;
}

.dark .message{
    color:black;
}
.counter{
text-align:center;
padding:10px;
font-weight:bold;
color:#ff4081;
}
#typing{
padding-left:10px;
color:gray;
font-style:italic;
}
</style>
</head>

<body>
<div class="hearts">
  <span>💖</span>
  <span>💕</span>
  <span>💗</span>
  <span>💘</span>
  <span>💝</span>
</div>

<div class="chat-container">

<div class="header">
💖 Bhavzzz Chat 💖
<button onclick="toggleTheme()">🌙</button>
</div>
<div class="counter">
❤️ Together for <span id="days"></span> days ❤️
</div>
<div class="user-box">
<input type="text" id="username" placeholder="Enter your name">
<button onclick="changeName()">✏️</button>
</div>

<div id="chatBox"></div>
<div id="replyBox" style="display:none;background:#f8f8f8;padding:8px;border-left:4px solid pink;">
    Replying to:
    <span id="replyText"></span>

    <button onclick="cancelReply()">❌</button>
</div>
<div id="typing"></div>
<div class="input-area">
<input type="text" id="message" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>
<button onclick="clearChat()">Clear Chat</button>
</div>

</div>

<script type="module">
    
    const password = prompt("Enter Chat Password ❤️");

if(password !== "vamshi24"){
    document.body.innerHTML = "<h1>Access Denied ❌</h1>";
    throw new Error("Wrong password");
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyBcZ8UD5VQJFk5gVgT0FgXR2BfTdmXrSow",
    authDomain: "bhavzzz-chat.firebaseapp.com",
    databaseURL: "https://bhavzzz-chat-default-rtdb.firebaseio.com",
    projectId: "bhavzzz-chat",
    storageBucket: "bhavzzz-chat.firebasestorage.app",
    messagingSenderId: "121442908479",
    appId: "1:121442908479:web:3c840a3041ce0116c7fb8a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let replyingTo = "";
const usernameInput = document.getElementById("username");

// Load saved name
const savedName = localStorage.getItem("chatUsername");

if(savedName){
    usernameInput.value = savedName;
    usernameInput.disabled = true;
}
window.replyToMessage = function(text){

    replyingTo = text;

    document.getElementById("replyBox").style.display = "block";

    document.getElementById("replyText").innerText = text;
}

window.cancelReply = function(){

    replyingTo = "";

    document.getElementById("replyBox").style.display = "none";
}
window.sendMessage = function(){

const msg=document.getElementById("message").value;
const user = usernameInput.value || "Anonymous";

// Save name first time
if(!localStorage.getItem("chatUsername")){
    localStorage.setItem("chatUsername", user);
    usernameInput.disabled = true;
}


if(msg==="") return;

push(ref(db,"messages"),{
name:user,
text:msg,
time:new Date().toLocaleTimeString()
});

document.getElementById("message").value="";
}
window.clearChat = function() {

    const pass = prompt("Enter admin password");

    if(pass !== "bhavzzz123"){
        alert("Wrong password!");
        return;
    }

    remove(ref(db, "messages"));
    document.getElementById("chatBox").innerHTML = "";
}
window.changeName = function(){
    localStorage.removeItem("chatUsername");
    location.reload();
}

document.getElementById("message").addEventListener("keypress",(e)=>{
if(e.key==="Enter"){
sendMessage();
}
});

onChildAdded(ref(db,"messages"),(snapshot)=>{

const data = snapshot.val();

const currentUser = localStorage.getItem("chatUsername");

const side = data.name === currentUser ? "right" : "left";

document.getElementById("chatBox").innerHTML += `
<div class="message ${side}">
    <div class="name">${data.name}</div>
    <div>${data.text}</div>
    <div class="time">${data.time}</div>
</div>
`;

const chat = document.getElementById("chatBox");
chat.scrollTop = chat.scrollHeight;

});
window.toggleTheme = function(){

document.body.classList.toggle("dark");

localStorage.setItem(
"theme",
document.body.classList.contains("dark")
);

}

if(localStorage.getItem("theme") === "true"){
document.body.classList.add("dark");
}
const startDate = new Date("2026-05-28");

const today = new Date();

const diff =
Math.floor(
(today-startDate)/(1000*60*60*24)
);

document.getElementById("days").textContent = diff;
</script>

</body>
</html>
